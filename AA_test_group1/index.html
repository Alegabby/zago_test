<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Images Presentation</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0; left: 0;
      background: #fff;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
 
    #stage {
      position: relative;
      width: 400px;
      height: 600px;
      overflow: visible;
      display: flex;
      justify-content: center;
      align-items: center;
    }
 
    .stimulus-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
    }
 
    .stimulus-image {
      display: block;
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: border 0.3s ease, opacity 0.15s ease;
      opacity: 0;
    }
 
    .omino {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
 
    .omino.above { top: calc(300px - 100px - 40px - 2.5rem); }
    .omino.below { top: calc(300px + 100px + 40px); }
 
    @keyframes walk-in-down {
      0%  { transform: translate(-50%, 0px)   rotate(0deg); }
      33% { transform: translate(-50%, 12px)  rotate(12deg); }
      66% { transform: translate(-50%, 24px)  rotate(-12deg); }
      100%{ transform: translate(-50%, 36px)  rotate(0deg); }
    }
    @keyframes walk-in-up {
      0%  { transform: translate(-50%, 0px)   rotate(0deg); }
      33% { transform: translate(-50%, -12px) rotate(-12deg); }
      66% { transform: translate(-50%, -24px) rotate(12deg); }
      100%{ transform: translate(-50%, -36px) rotate(0deg); }
    }
    @keyframes walk-away-up {
      0%  { transform: translate(-50%, 0px)   rotate(0deg); }
      33% { transform: translate(-50%, -12px) rotate(-12deg); }
      66% { transform: translate(-50%, -24px) rotate(12deg); }
      100%{ transform: translate(-50%, -36px) rotate(0deg); }
    }
    @keyframes walk-away-down {
      0%  { transform: translate(-50%, 0px)  rotate(0deg); }
      33% { transform: translate(-50%, 12px) rotate(12deg); }
      66% { transform: translate(-50%, 24px) rotate(-12deg); }
      100%{ transform: translate(-50%, 36px) rotate(0deg); }
    }
 
    .walk-in-down   { animation: walk-in-down   0.8s ease forwards; }
    .walk-in-up     { animation: walk-in-up     0.8s ease forwards; }
    .walk-away-up   { animation: walk-away-up   0.8s ease forwards; }
    .walk-away-down { animation: walk-away-down 0.8s ease forwards; }
 
    .border-yellow { border: 5px solid #FFC20A; }
    .border-blue   { border: 5px solid #0C7BDC; }
 
    #error-message {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      border-radius: 4px;
      z-index: 10;
      display: none;
      background: rgba(220,40,40,0.80);
      color: #fff;
      white-space: nowrap;
    }
 
    #final-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="error-message">Risposta sbagliata. Riprova.</div>
    <div id="final-message"></div>
  </div>
 
  <script>
    const setA = ['setA/img1.jpg','setA/img2.jpg','setA/img3.jpg','setA/img4.jpg','setA/img5.jpg','setA/img6.jpg','setA/img7.jpg','setA/img8.jpg','setA/img9.jpg','setA/img10.jpg','setA/img11.jpg','setA/img12.jpg','setA/img13.jpg','setA/img14.jpg','setA/img15.jpg','setA/img16.jpg','setA/img17.jpg','setA/img18.jpg','setA/img19.jpg','setA/img20.jpg','setA/img21.jpg','setA/img22.jpg','setA/img23.jpg','setA/img24.jpg','setA/img25.jpg','setA/img26.jpg','setA/img27.jpg','setA/img28.jpg','setA/img29.jpg','setA/img30.jpg'];
    const setB = ['setB/img1.jpg','setB/img2.jpg','setB/img3.jpg','setB/img4.jpg','setB/img5.jpg','setB/img6.jpg','setB/img7.jpg','setB/img8.jpg','setB/img9.jpg','setB/img10.jpg','setB/img11.jpg','setB/img12.jpg','setB/img13.jpg','setB/img14.jpg','setB/img15.jpg','setB/img16.jpg','setB/img17.jpg','setB/img18.jpg','setB/img19.jpg','setB/img20.jpg','setB/img21.jpg','setB/img22.jpg','setB/img23.jpg','setB/img24.jpg','setB/img25.jpg','setB/img26.jpg','setB/img27.jpg','setB/img28.jpg','setB/img29.jpg','setB/img30.jpg'];
 
    function genPlac(n) {
      const h = Math.floor(n / 2);
      const arr = [...Array(h).fill('above'), ...Array(h).fill('below')];
      if (n % 2) arr.push(Math.random() < .5 ? 'above' : 'below');
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
 
    const pA = genPlac(setA.length), pB = genPlac(setB.length);
 
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
 
    const seq = shuffle([
      ...setA.map((s, i) => ({ src: s, set: 'A', placement: pA[i] })),
      ...setB.map((s, i) => ({ src: s, set: 'B', placement: pB[i] }))
    ]);
 
    let idx = 0, errors = 0, isReady = false, acceptingResponse = false;
    const stage = document.getElementById('stage');
    const err   = document.getElementById('error-message');
    const fin   = document.getElementById('final-message');
 
    function preloadImages(imageArray) {
      return Promise.all(imageArray.map(src => new Promise((resolve, reject) => {
        const img = new Image();
        img.src = src;
        img.onload = resolve;
        img.onerror = reject;
      })));
    }
 
    function scaleStage() {
      const padding = 100;
      const scaleX = (window.innerWidth  - padding * 2) / 400;
      const scaleY = (window.innerHeight - padding * 2) / 600;
      const scale  = Math.min(scaleX, scaleY, 1);
      stage.style.transform = `scale(${scale})`;
      stage.style.transformOrigin = 'center center';
    }
    scaleStage();
    window.addEventListener('resize', scaleStage);
 
    function show() {
      stage.querySelectorAll('.stimulus-wrapper, .omino').forEach(el => el.remove());
      err.style.display = 'none';
 
      if (idx >= seq.length) {
        if (window.parent === window) {
          fin.innerHTML = 'Sequenza completata.';
          fin.style.display = 'block';
        }
      setTimeout(() => {
        window.parent.postMessage({ done: true, errors }, "*");
      }, 50);
      return;
      }
       
      const { src, set, placement } = seq[idx];
 
      const w = document.createElement('div');
      w.className = 'stimulus-wrapper';
      const img = document.createElement('img');
      img.src = src;
      img.className = 'stimulus-image';
      w.appendChild(img);
      stage.appendChild(w);
 
      const p = document.createElement('div');
      p.className = `omino ${placement}`;
      p.innerHTML = '<i class="fa-solid fa-male"></i>';
      stage.appendChild(p);
 
      const reveal = () => {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            img.style.opacity = '1';
            p.style.opacity = '1';
            img.classList.add(set === 'A' ? 'border-yellow' : 'border-blue');
            setTimeout(() => { acceptingResponse = true; }, 200);
          });
        });
      };
 
      if (img.complete && img.naturalWidth > 0) {
        reveal();
      } else {
        img.onload = reveal;
      }
    }
 
    function handle(dir) {
      if (!acceptingResponse) return;
      acceptingResponse = false;
 
      const pEl = stage.querySelector('.omino');
      const { set, placement } = seq[idx];
      const exp = set === 'A'
        ? (placement === 'above' ? 'down' : 'up')
        : (placement === 'above' ? 'up'   : 'down');
 
      if (dir !== exp) {
        errors++;
        err.style.display = 'block';
        setTimeout(() => {
          err.style.display = 'none';
          acceptingResponse = true;
        }, 350);
        return;
      }
 
      const cls = (set === 'B' ? 'walk-away-' : 'walk-in-') + exp;
      pEl.classList.add(cls);
      pEl.addEventListener('animationend', () => {
        setTimeout(() => {
          pEl.classList.remove(cls);
          idx++;
          show();
        }, 200);
      }, { once: true });
    }
 
    let y0;
    stage.addEventListener('touchstart', e => y0 = e.changedTouches[0].clientY);
    stage.addEventListener('touchend', e => {
      const d = e.changedTouches[0].clientY - y0;
      if (d > 50) handle('down');
      else if (d < -50) handle('up');
    });
 
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp') handle('up');
      else if (e.key === 'ArrowDown') handle('down');
    });
 
    window.addEventListener('message', e => {
      if (e.data && e.data.key === 'up')   handle('up');
      if (e.data && e.data.key === 'down') handle('down');
    });
 
    document.addEventListener('touchmove', e => {
      if (window.scrollY === 0 && e.changedTouches[0].clientY > 0) e.preventDefault();
    }, { passive: false });
 
    preloadImages([...setA, ...setB]).then(() => {
      isReady = true;
      if (window.parent === window) show();
    });
 
    window.addEventListener('message', e => {
      if (e.data && e.data.start && isReady) show();
    });
  </script>
</body>
</html>
